<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tutor Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <h1>TUTOR LOGIN</h1>
    <p class="login-sub">College Complaint System</p>

    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form action="/tutor/login" method="POST" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Login →</button>
    </form>

    <p style="text-align:center; margin-top:20px; color:#aaa;">
      Student? <a href="{{ url_for('login') }}" style="color:#e74c3c; font-weight:600;">Go to Student Login</a>
    </p>

  </div>
</div>

</body>
</html>
